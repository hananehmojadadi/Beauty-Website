<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment | Beauty Studio</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(145deg,#fff0f5,#ffe0ec);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.booking-container {
  background: #fff;
  max-width: 420px;
  width: 100%;
  padding: 2rem;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(255,105,180,0.25);
  animation: fadeIn .6s ease;
}

h2 {
  font-family: 'Playfair Display', serif;
  color: #b71c1c;
  text-align: center;
  margin-bottom: 1.5rem;
  font-size: 1.6rem;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 14px; /* equal spacing */
}

input, select {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #f8bbd0;
  font-size: 0.95rem;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #c2185b;
  box-shadow: 0 0 8px rgba(194,24,91,0.2);
  outline: none;
}

/* Book Button */
.book-btn {
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: #c2185b;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.book-btn:hover {
  background: #880e4f;
  transform: scale(1.04);
}

/* Back Home */
.back-home {
  display: block;
  text-align: center;
  margin-top: 15px;
  text-decoration: none;
  color: #c2185b;
  font-size: 0.9rem;
  font-weight: 500;
  transition: 0.3s;
}

.back-home:hover {
  color: #880e4f;
  transform: translateX(-3px);
}

/* Success Popup */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transition: 0.4s;
}

.popup.active {
  visibility: visible;
  opacity: 1;
}

.popup-content {
  background: #fff;
  padding: 2rem;
  border-radius: 16px;
  text-align: center;
  max-width: 320px;
  width: 90%;
  animation: scaleUp 0.4s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.popup-content h3 {
  color: #c2185b;
  margin-bottom: 10px;
}

.popup-content button {
  margin-top: 15px;
  padding: 8px 20px;
  border: none;
  border-radius: 20px;
  background: #c2185b;
  color: white;
  cursor: pointer;
  font-weight: 500;
}

.popup-content button:hover {
  background: #880e4f;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

@keyframes scaleUp {
  from { transform: scale(0.8); opacity: 0;}
  to { transform: scale(1); opacity: 1;}
}

/* Responsive */
@media(max-width:480px){
  .booking-container { padding: 1.5rem; }
  h2 { font-size: 1.4rem; }
}
</style>
</head>

<body>

<div class="booking-container">
  <h2>Book Your Appointment 💄</h2>

  <form id="bookingForm">
    <input type="text" placeholder="Full Name" required>
    <input type="tel" placeholder="Phone Number" required>
    <select required>
      <option value="">Select Service</option>
      <option>Makeup</option>
      <option>Facial</option>
      <option>Hair Styling</option>
      <option>Nails</option>
    </select>
    <input type="date" required>
    <input type="time" required>

    <!-- Book Button INSIDE the form -->
    <button type="submit" class="book-btn">Book Now</button>

    <!-- Back Home Link INSIDE the form container -->
    <a href="index.html" class="back-home">← Back to Home</a>
  </form>
</div>

<!-- Success Popup -->
<div class="popup" id="successPopup">
  <div class="popup-content">
    <h3>🎉 Booking Confirmed!</h3>
    <p>Your appointment has been successfully booked.</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const form = document.getElementById("bookingForm");
const popup = document.getElementById("successPopup");

form.addEventListener("submit", function(e){
  e.preventDefault();
  popup.classList.add("active");
  form.reset();
});

function closePopup(){
  popup.classList.remove("active");
}
</script>


</body>
</html>
